      <path d="M8.835 9.109a1.266 1.266 0 100-2.532 1.266 1.266 0 000 2.532zM15.165 9.109a1.266 1.266 0 100-2.532 1.266 1.266 0 000 2.532z" fill="#050810"/>
      <path d="M9.046 8.16a.527.527 0 100-1.056.527.527 0 000 1.055zM15.376 8.16a.527.527 0 100-1.055.527.527 0 000 1.054z" fill="#00E5CC"/>
    </symbol>
    <symbol id="icon-robot" viewBox="0 0 36 36">
      <rect width="36" height="36" rx="10" fill="#F8FAFC"/>
      <path d="M18 6.8v4.1" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
      <circle cx="18" cy="6.3" r="2.1" fill="#2F72FF"/>
      <rect x="8.4" y="11" width="19.2" height="15.2" rx="4.4" fill="#FFFFFF" stroke="#64748B" stroke-width="2"/>
      <circle cx="14.4" cy="18.1" r="1.7" fill="#0B1F33"/>
