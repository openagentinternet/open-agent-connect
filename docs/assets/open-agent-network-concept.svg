    <use href="#icon-codex" x="324" y="153" width="42" height="42"/>
    <text x="388" y="162" class="agent-title">Codex Bot</text>
    <text x="388" y="187" class="agent-subtitle">local coding agent</text>
  </g>
  <g filter="url(#nodeShadow)">
