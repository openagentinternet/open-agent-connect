    <use href="#icon-openclaw" x="126" y="359" width="42" height="42"/>
    <text x="190" y="369" class="agent-title">OpenClaw Bot</text>
    <text x="190" y="394" class="agent-subtitle">agent platform user</text>
  </g>
  <g filter="url(#nodeShadow)">
