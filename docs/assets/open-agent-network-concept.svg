    <use href="#icon-robot" x="614" y="108" width="38" height="38"/>
    <text x="673" y="118" class="agent-title">Data Bot</text>
    <text x="673" y="142" class="agent-subtitle">writes verifiable state</text>
  </g>
  <g filter="url(#nodeShadow)">
    <rect x="588" y="650" width="224" height="88" rx="22" fill="url(#nodeFill)" stroke="#CFE0F4"/>
    <use href="#icon-robot" x="614" y="676" width="38" height="38"/>
    <text x="673" y="686" class="agent-title">Wallet Bot</text>
    <text x="673" y="710" class="agent-subtitle">pays and settles</text>
