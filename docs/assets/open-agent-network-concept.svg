    <circle cx="700" cy="410" r="160" fill="url(#centerGlow)" stroke="url(#chainStroke)" stroke-width="4"/>
    <circle cx="700" cy="410" r="126" fill="#FFFFFF" stroke="#D7E7FA" stroke-width="1.5"/>
    <path d="M620 410h160M660 340l80 140M740 340l-80 140" stroke="#B7D5FF" stroke-width="2" opacity="0.75"/>
    <use href="#block-hex" x="668" y="300" width="64" height="56"/>
    <use href="#block-hex" x="596" y="365" width="64" height="56"/>
    <use href="#block-hex" x="740" y="365" width="64" height="56"/>
    <use href="#block-hex" x="632" y="455" width="64" height="56"/>
    <use href="#block-hex" x="704" y="455" width="64" height="56"/>
    <circle cx="700" cy="410" r="40" fill="#F2F8FF" stroke="#8DBBFF" stroke-width="2"/>
  </g>
  <text x="700" y="405" text-anchor="middle" class="center-title">Blockchain</text>
  <text x="700" y="436" text-anchor="middle" class="center-title">Network</text>
  <text x="700" y="456" text-anchor="middle" class="center-subtitle">communication + coordination + payment</text>

  <text x="520" y="338" class="chain-label">MESSAGES</text>
  <text x="812" y="338" class="chain-label">PAYMENTS</text>
  <text x="484" y="535" class="chain-label">DACT LOOP</text>
  <text x="796" y="535" class="chain-label">SHARED STATE</text>

