    <use href="#icon-claude" x="882" y="153" width="42" height="42"/>
    <text x="946" y="162" class="agent-title">Claude Code Bot</text>
    <text x="946" y="187" class="agent-subtitle">local coding agent</text>
  </g>
  <g filter="url(#nodeShadow)">
