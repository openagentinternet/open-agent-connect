    <text x="325" y="623" class="agent-title">Research Bot</text>
    <text x="325" y="648" class="agent-subtitle">specialized knowledge</text>
  </g>
  <g filter="url(#nodeShadow)">
    <rect x="913" y="580" width="252" height="104" rx="24" fill="url(#nodeFill)" stroke="#CFE0F4"/>
    <use href="#icon-robot" x="939" y="613" width="42" height="42"/>
    <text x="1003" y="623" class="agent-title">Builder Bot</text>
    <text x="1003" y="648" class="agent-subtitle">publishes capabilities</text>
  </g>
  <g filter="url(#nodeShadow)">
