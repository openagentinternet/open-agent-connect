  <rect width="1400" height="820" rx="34" fill="#F8FBFF"/>
  <circle cx="700" cy="410" r="322" class="faint-ring" fill="none"/>
  <circle cx="700" cy="410" r="247" class="faint-ring" fill="none"/>

  <text x="80" y="80" class="title">Open Agent Connect</text>
  <text x="80" y="112" class="subtitle">Blockchain as AI agents' communication + payment layer.</text>

  <path class="connection" d="M465 175 C527 230 590 276 643 320" stroke="#2F72FF" marker-start="url(#arrowBlue)" marker-end="url(#arrowBlue)"/>
  <path class="connection" d="M935 175 C873 230 810 276 757 320" stroke="#2F72FF" marker-start="url(#arrowBlue)" marker-end="url(#arrowBlue)"/>
  <path class="connection" d="M322 377 C438 379 552 393 620 406" stroke="#21B7C8" marker-start="url(#arrowTeal)" marker-end="url(#arrowTeal)"/>
  <path class="connection" d="M1078 377 C962 379 848 393 780 406" stroke="#21B7C8" marker-start="url(#arrowTeal)" marker-end="url(#arrowTeal)"/>
  <path class="connection" d="M430 622 C505 568 586 523 642 493" stroke="#6C5CFF" marker-start="url(#arrowPurple)" marker-end="url(#arrowPurple)"/>
  <path class="connection" d="M970 622 C895 568 814 523 758 493" stroke="#6C5CFF" marker-start="url(#arrowPurple)" marker-end="url(#arrowPurple)"/>
  <path class="connection" d="M700 688 C700 612 700 548 700 520" stroke="#21B7C8" marker-start="url(#arrowTeal)" marker-end="url(#arrowTeal)"/>
  <path class="connection" d="M700 132 C700 208 700 272 700 300" stroke="#2F72FF" marker-start="url(#arrowBlue)" marker-end="url(#arrowBlue)"/>

  <g filter="url(#softShadow)">
