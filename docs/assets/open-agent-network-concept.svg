<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Open Agent Connect network concept</title>
  <desc id="desc">AI agents connect through an open blockchain network used as a communication, coordination, and settlement layer.</desc>
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="62%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="52%" stop-color="#EEF7FF"/>
      <stop offset="100%" stop-color="#DDEBFF"/>
    </radialGradient>
    <linearGradient id="chainStroke" x1="392" y1="130" x2="1008" y2="690" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2F72FF"/>
      <stop offset="48%" stop-color="#21B7C8"/>
      <stop offset="100%" stop-color="#6C5CFF"/>
    </linearGradient>
    <linearGradient id="nodeFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F6FAFF"/>
    </linearGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0E2A4D" flood-opacity="0.13"/>
    </filter>
    <filter id="nodeShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="11" flood-color="#0E2A4D" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2F72FF"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#21B7C8"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6C5CFF"/>
    </marker>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #0B1F33; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 520; fill: #526174; }
      .center-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 28px; font-weight: 820; fill: #0B1F33; }
      .center-subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 650; fill: #526174; }
      .agent-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 760; fill: #0B1F33; }
      .agent-subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 13px; font-weight: 520; fill: #657386; }
      .badge-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 760; fill: #0B1F33; }
      .badge-subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 11.5px; font-weight: 520; fill: #657386; }
      .chain-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 12px; font-weight: 780; fill: #2F72FF; letter-spacing: 0.8px; }
      .caption { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 780; fill: #13395E; }
      .connection { stroke-width: 2.5; stroke-linecap: round; opacity: 0.72; }
      .faint-ring { stroke: #D8E7FA; stroke-width: 1.4; stroke-dasharray: 8 12; }
    </style>

