<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__PAGE_TITLE__</title>
    <link rel="stylesheet" href="/ui/shared.css" />
    <style>
      .publish-shell {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 380px);
        gap: 20px;
        align-items: start;
      }
      .publish-main {
        display: grid;
        gap: 12px;
        min-width: 0;
      }
      .publish-availability {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        overflow-wrap: anywhere;
      }
      .publish-availability[data-tone="ready"] {
        border-color: rgba(34,197,94,.32);
        background: var(--green-dim);
        color: var(--green);
      }
      .publish-availability[data-tone="blocked"] {
        border-color: rgba(245,158,11,.34);
        background: var(--amber-dim);
        color: var(--amber);
      }
      .publish-form {
        position: relative;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 22px;
      }
      .publish-form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
      .publish-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .publish-field-wide { grid-column: span 2; }
      .publish-field span {
        font-size: 11px;
        font-family: var(--mono);
        text-transform: uppercase;
        letter-spacing: .06em;
        color: var(--muted);
      }
      .publish-field input,
      .publish-field select,
      .publish-field textarea {
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: var(--radius-sm);
        padding: 9px 12px;
        color: var(--text);
        font-family: var(--sans);
        font-size: 13px;
        transition: border-color .15s;
        width: 100%;
      }
      .publish-field select {
        appearance: none;
        min-height: 38px;
      }
      .publish-field input:focus,
      .publish-field select:focus,
      .publish-field textarea:focus { outline: none; border-color: var(--accent); }
      .publish-field input:disabled,
      .publish-field select:disabled,
      .publish-field textarea:disabled {
        opacity: .6;
        cursor: not-allowed;
      }
      .publish-field input[readonly] {
        color: var(--muted);
        background: rgba(28,32,48,.72);
      }
      .publish-field textarea {
        min-height: 104px;
        resize: vertical;
      }
      .publish-field-note {
        color: var(--dim);
        font-size: 11px;
        line-height: 1.45;
      }
      .publish-icon-field {
        gap: 8px;
      }
      .publish-icon-uploader {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }
      .publish-icon-preview {
        width: 64px;
        height: 64px;
        border-radius: 8px;
        border: 1px solid var(--border2);
        background: var(--surface2);
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 64px;
        overflow: hidden;
      }
      .publish-icon-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .publish-icon-preview span {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--dim);
        letter-spacing: .08em;
      }
      .publish-icon-controls {
        display: grid;
        gap: 8px;
        min-width: 0;
      }
      .publish-icon-controls input[type="file"] {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }
      .publish-icon-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .publish-form .btn:disabled {
        opacity: .52;
        cursor: not-allowed;
      }
      .publish-skill-summary {
        margin-top: 12px;
        color: var(--muted);
        font-size: 12px;
        min-height: 18px;
        overflow-wrap: anywhere;
      }
      .publish-actions {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .publish-status {
        font-size: 12px;
        font-family: var(--mono);
        color: var(--muted);
      }
      .publish-status[data-tone="success"] { color: var(--green); }
      .publish-status[data-tone="error"]   { color: var(--red); }
      .publish-status[data-tone="busy"]    { color: var(--amber); }
      .publish-status[data-tone="ready"]   { color: var(--green); }
      .publish-status-panel {
        position: absolute;
        inset: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        border-radius: 8px;
        background: rgba(13,15,18,.68);
        backdrop-filter: blur(8px);
      }
      .publish-status-dialog {
        width: min(100%, 360px);
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr);
        gap: 14px;
        align-items: center;
        background: var(--surface);
        border: 1px solid var(--border2);
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 18px 48px rgba(0,0,0,.32);
      }
      .publish-status-mark {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        border: 2px solid rgba(99,102,241,.35);
        border-top-color: var(--accent);
        animation: publish-spin .9s linear infinite;
      }
      .publish-status-mark[data-state="success"],
      .publish-status-mark[data-state="error"] {
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        animation: none;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
      }
      .publish-status-mark[data-state="success"] {
        background: var(--green-dim);
        color: var(--green);
      }
      .publish-status-mark[data-state="success"]::before { content: "OK"; }
      .publish-status-mark[data-state="error"] {
        background: var(--red-dim);
        color: var(--red);
      }
      .publish-status-mark[data-state="error"]::before { content: "!"; }
      .publish-status-copy h2 {
        margin: 0 0 4px;
        font-size: 14px;
        font-weight: 600;
      }
      .publish-status-copy p {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        overflow-wrap: anywhere;
      }
      .publish-status-dialog .btn {
        grid-column: 2;
        justify-self: start;
        margin-top: 4px;
      }
      @keyframes publish-spin {
        to { transform: rotate(360deg); }
      }
      .publish-cards {
        display: grid;
        gap: 14px;
        position: sticky;
        top: 76px;
      }
      .publish-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
      }
      .publish-card h2 { font-size: 13px; font-family: var(--mono); font-weight: 500; margin-bottom: 8px; }
      .publish-card-summary,
      .publish-card-empty { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
      .publish-card-rows { display: grid; gap: 0; }
      .publish-card-row {
        display: grid;
        grid-template-columns: 132px minmax(0, 1fr);
        gap: 12px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }
      .publish-card-row dt { font-size: 11px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
      .publish-card-row dd { margin: 0; font-size: 12px; overflow-wrap: anywhere; font-family: var(--mono); color: var(--dim); }
      @media (max-width: 900px) {
        .publish-shell { grid-template-columns: 1fr; }
        .publish-cards { position: static; }
        .publish-form-grid { grid-template-columns: 1fr; }
        .publish-field-wide { grid-column: span 1; }
      }
      @media (max-width: 520px) {
        .publish-form { padding: 16px; }
        .publish-icon-uploader { align-items: flex-start; }
        .publish-card-row { grid-template-columns: 1fr; gap: 4px; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="topbar-logo" href="/ui/hub">MetaBot</a>
        <div class="topbar-sep"></div>
        <span class="topbar-title">__PAGE_EYEBROW__</span>
        <div class="topbar-spacer"></div>
        <nav class="topbar-nav">__PAGE_NAV__</nav>
      </header>
      <main class="content">
        __PAGE_CONTENT__
      </main>
    </div>
    <script>__PAGE_SCRIPT__</script>
  </body>
</html>
