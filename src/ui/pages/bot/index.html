<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__PAGE_TITLE__</title>
    <link rel="stylesheet" href="/ui/shared.css" />
    <style>
      .runtime-card { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 8px; }
      .runtime-card .name { font-weight: 600; color: var(--text); }
      .runtime-card .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
      .flex-row { display: flex; align-items: center; gap: 10px; }
      .health-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
      .health-dot.healthy { background: var(--green, #4ade80); }
      .health-dot.degraded { background: var(--amber, #fbbf24); }
      .health-dot.unavailable { background: var(--red, #f87171); }
      .health-dot.unknown { background: var(--muted, #9ca3af); }
      .binding-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border2); }
      .binding-role { font-size: 11px; text-transform: uppercase; font-weight: 600; background: var(--surface2); border: 1px solid var(--border2); padding: 2px 8px; border-radius: 4px; color: var(--text); }
      .btn { font-size: 13px; padding: 6px 14px; border: 1px solid var(--border2); border-radius: var(--radius); cursor: pointer; background: var(--surface2); color: var(--text); }
      .btn:hover { background: var(--surface-hover); }
      .btn:disabled { opacity: 0.5; cursor: default; }
      .input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
      .input-row input { padding: 6px 10px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface2); color: var(--text); font-size: 13px; }
      .section-title { font-size: 15px; font-weight: 600; color: var(--text); margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border2); }
    </style>
  </head>
  <body>
    <div class="app-shell">
      __PAGE_NAV__
      <main class="main-content">
        <div class="page-header">
          <p class="eyebrow">__PAGE_EYEBROW__</p>
          <h1 class="page-heading">__PAGE_HEADING__</h1>
        </div>
        <div class="section-title">LLM Runtimes <button class="btn" style="margin-left:12px" data-discover-btn>Discover Runtimes</button></div>
        <div data-runtimes-panel><p class="dim">Loading runtimes…</p></div>

        <div class="section-title">MetaBot Bindings</div>
        <div class="input-row">
          <input type="text" data-slug-input placeholder="Profile slug (e.g. my-bot)" style="flex:1;max-width:300px" />
          <button class="btn" data-load-bindings-btn>Load Bindings</button>
        </div>
        <div data-slug-label style="font-size:13px;color:var(--muted);margin-bottom:8px"></div>
        <div data-bindings-panel><p class="dim">Enter a profile slug and click "Load Bindings".</p></div>
        __PAGE_CONTENT__
      </main>
    </div>
    <script>__PAGE_SCRIPT__</script>
  </body>
</html>
