<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__PAGE_TITLE__</title>
    <link rel="stylesheet" href="/ui/shared.css" />
    <style>
      /* Chat viewer needs a full-height layout */
      .chat-shell {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      .chat-main {
        flex: 1;
        max-width: 1180px;
        width: 100%;
        margin: 0 auto;
        padding: 18px 24px 28px;
        display: grid;
        grid-template-rows: auto auto minmax(360px, 1fr);
        gap: 14px;
        min-height: 0;
      }
      .peer-control {
        display: grid;
        gap: 6px;
        min-width: min(360px, calc(100vw - 32px));
      }
      .peer-control > .field-label {
        font-size: 11px;
        font-family: var(--mono);
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .06em;
      }
      .peer-row {
        display: flex;
        gap: 8px;
      }
      .peer-row input {
        flex: 1;
        min-width: 0;
        height: 36px;
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: var(--radius-sm);
        padding: 0 12px;
        color: var(--text);
        font-family: var(--sans);
        font-size: 13px;
        transition: border-color .15s;
      }
      .peer-row input:focus { outline: none; border-color: var(--accent); }
      .meta-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: none;
        border: none;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: .06em;
        cursor: pointer;
        padding: 0 0 6px;
        transition: color .15s;
      }
      .meta-toggle:hover { color: var(--text); }
      .meta-toggle-arrow { display: inline-block; transition: transform 200ms ease; font-size: 10px; }
      .meta-toggle-arrow.collapsed { transform: rotate(-90deg); }
      .conversation-meta {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }
      .conversation-meta.collapsed { display: none; }
      .message-surface {
        min-height: 0;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--surface);
        margin-bottom: 24px;
      }
      id-chat-msg-list {
        display: block;
        width: 100%;
        height: min(680px, calc(100svh - 250px));
        min-height: 360px;
        --id-bg-body: var(--surface2);
        --id-text-secondary: var(--muted);
        --id-color-primary: var(--accent);
      }
      [data-chat-status][data-tone="ready"]   { color: var(--green); }
      [data-chat-status][data-tone="error"]   { color: var(--red); }
      [data-chat-status][data-tone="warning"] { color: var(--amber); }
      .peer-avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
        background: var(--surface2);
      }
      .peer-info { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
      .peer-name { font-weight: 500; font-size: 13px; overflow-wrap: anywhere; }
      @media (max-width: 860px) {
        .chat-main { padding: 16px; }
        .conversation-meta { grid-template-columns: 1fr 1fr; }
        id-chat-msg-list { height: calc(100svh - 360px); }
      }
      @media (max-width: 560px) {
        .peer-row { flex-direction: column; }
        .conversation-meta { grid-template-columns: 1fr; }
        id-chat-msg-list { min-height: 320px; height: calc(100svh - 520px); }
      }
    </style>
  </head>
  <body>
    <div class="chat-shell">
      <header class="topbar">
        <a class="topbar-logo" href="/ui/hub">MetaBot</a>
        <div class="topbar-sep"></div>
        <span class="topbar-title">__PAGE_EYEBROW__</span>
        <div class="topbar-spacer"></div>
        <div style="display:flex;gap:8px;align-items:center">
          <label class="peer-control">
            <span class="field-label">Peer globalMetaId</span>
            <span class="peer-row">
              <input data-chat-peer-input type="text" autocomplete="off" spellcheck="false" placeholder="gm-target" />
              <button class="btn btn-primary btn-sm" data-chat-refresh type="button">Refresh</button>
              <button class="btn btn-danger btn-sm" data-chat-stop type="button">End Chat</button>
            </span>
          </label>
        </div>
      </header>

      <main class="chat-main">
        <div>
          <button class="meta-toggle" data-meta-toggle type="button">
            <span class="meta-toggle-arrow" data-meta-arrow>&#9660;</span> Info
          </button>
        </div>

        <section class="conversation-meta" data-meta-section aria-label="Conversation status">
          <div class="stat-card">
            <div class="stat-label">Local MetaBot</div>
            <div class="stat-value sm" data-chat-self>Waiting…</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Peer MetaBot</div>
            <div data-chat-peer-container>
              <div class="stat-value sm" data-chat-peer>No peer selected</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Messages</div>
            <div class="stat-value sm" data-chat-count>0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Status</div>
            <div class="stat-value sm" data-chat-status data-tone="neutral">Ready</div>
          </div>
        </section>

        <section class="message-surface" aria-label="Private chat messages">
          <id-chat-msg-list
            data-chat-message-list
            viewer-mode="standalone"
            mode="private"
            disable-mention-navigation="true"
          ></id-chat-msg-list>
        </section>
      </main>
    </div>
    <script>__PAGE_SCRIPT__</script>
  </body>
</html>
