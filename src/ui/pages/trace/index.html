<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__PAGE_TITLE__</title>
    <link rel="stylesheet" href="/ui/shared.css" />
    <style>
      /* ── Trace page: full-height two-panel layout ── */
      .trace-shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* Stats strip */
      .trace-stats {
        display: flex;
        gap: 12px;
        padding: 16px 24px 0;
        flex-shrink: 0;
        flex-wrap: wrap;
      }
      .trace-stats .stat-card {
        flex: 1;
        min-width: 120px;
      }

      /* Two-panel workspace */
      .trace-workspace {
        flex: 1;
        display: flex;
        gap: 0;
        min-height: 0;
        margin: 16px 24px 24px;
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        background: var(--surface);
      }

      /* ── Left panel: session list ── */
      .session-panel {
        width: 280px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        min-height: 0;
        background: var(--surface);
      }
      .session-panel-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .session-panel-title {
        font-size: 11px;
        font-family: var(--mono);
        font-weight: 500;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .08em;
        flex: 1;
      }
      .session-panel-count {
        font-size: 11px;
        font-family: var(--mono);
        color: var(--dim);
      }
      .session-list-scroll {
        flex: 1;
        overflow-y: auto;
        min-height: 0;
      }
      .session-list-scroll::-webkit-scrollbar { width: 4px; }
      .session-list-scroll::-webkit-scrollbar-track { background: transparent; }
      .session-list-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

      /* Session list items */
      .session-item {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: background .1s;
        outline: none;
      }
      .session-item:hover { background: var(--surface2); }
      .session-item.selected { background: var(--surface3); border-left: 2px solid var(--accent); }
      .session-item.selected:hover { background: var(--surface3); }

      .session-item-header {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 5px;
      }
      .session-role-badge {
        font-size: 9px;
        font-family: var(--mono);
        font-weight: 500;
        padding: 2px 6px;
        border-radius: 3px;
        text-transform: uppercase;
        letter-spacing: .08em;
      }
      .badge-caller  { background: var(--accent-dim); color: var(--accent); }
      .badge-provider { background: var(--green-dim); color: var(--green); }

      .session-time {
        font-size: 10px;
        font-family: var(--mono);
        color: var(--dim);
        margin-left: auto;
      }
      .session-item-peer {
        font-size: 12px;
        color: var(--text);
        font-weight: 500;
        margin-bottom: 2px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .session-item-local {
        font-size: 11px;
        font-family: var(--mono);
        color: var(--dim);
        margin-bottom: 6px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .session-item-footer {
        display: flex;
        align-items: center;
      }

      /* Empty / loading states */
      .session-empty {
        padding: 32px 20px;
        text-align: center;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }
      .session-empty-hint {
        margin-top: 8px;
        font-size: 11px;
        font-family: var(--mono);
        color: var(--dim);
      }

      /* ── Right panel: session detail ── */
      .detail-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        min-width: 0;
        background: var(--bg);
      }

      /* Detail empty / loading */
      .detail-empty,
      .detail-loading {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 13px;
        flex-direction: column;
        gap: 8px;
        padding: 32px;
        text-align: center;
      }

      /* Detail header: participants row */
      .detail-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        flex-shrink: 0;
      }
      .detail-header-participant {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
        min-width: 0;
      }
      .detail-header-participant-right {
        justify-content: flex-end;
        flex-direction: row;
      }
      .participant-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
        background: var(--surface2);
      }
      .participant-info {
        min-width: 0;
        flex: 1;
      }
      .participant-info-right {
        text-align: right;
      }
      .participant-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .participant-role {
        font-size: 11px;
        font-family: var(--mono);
        color: var(--muted);
      }
      .detail-header-meta {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
        padding: 0 8px;
      }
      .detail-trace-id {
        font-size: 10px;
        color: var(--dim);
        text-align: center;
        max-width: 180px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .detail-trace-row {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        max-width: 230px;
      }

      /* Messages scroll area */
      .messages-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 16px 0 24px;
        min-height: 0;
      }
      .messages-scroll::-webkit-scrollbar { width: 4px; }
      .messages-scroll::-webkit-scrollbar-track { background: transparent; }
      .messages-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

      .messages-list { display: flex; flex-direction: column; gap: 4px; }
      .messages-empty {
        padding: 32px;
        text-align: center;
        color: var(--muted);
        font-size: 12px;
      }

      /* System message */
      .msg-system {
        display: flex;
        justify-content: center;
        padding: 6px 24px;
      }
      .msg-system span {
        font-size: 11px;
        font-family: var(--mono);
        color: var(--dim);
        font-style: italic;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 3px 12px;
      }

      /* Tool call block */
      .msg-tool {
        margin: 4px 24px;
        border: 1px solid var(--border2);
        border-radius: var(--radius-sm);
        overflow: hidden;
        font-size: 11px;
      }
      .tool-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 7px 12px;
        background: var(--surface2);
        border: none;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11px;
        cursor: pointer;
        text-align: left;
        transition: background .1s;
      }
      .tool-toggle:hover { background: var(--surface3); color: var(--text); }
      .tool-chevron { color: var(--dim); font-size: 9px; }
      .tool-body { background: var(--bg); }
      .tool-input, .tool-result {
        font-family: var(--mono);
        font-size: 11px;
        padding: 10px 14px;
        margin: 0;
        white-space: pre-wrap;
        word-break: break-all;
        line-height: 1.6;
        color: var(--muted);
      }
      .tool-result {
        border-top: 1px solid var(--border);
        color: var(--text);
      }

      /* Chat bubble rows */
      .msg-row {
        display: flex;
        align-items: flex-end;
        gap: 8px;
        padding: 3px 20px;
      }
      .msg-local { flex-direction: row-reverse; }
      .msg-peer  { flex-direction: row; }

      .msg-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
        background: var(--surface2);
        margin-bottom: 18px;
      }

      .msg-body {
        display: flex;
        flex-direction: column;
        max-width: 70%;
      }
      .msg-local .msg-body { align-items: flex-end; }
      .msg-peer  .msg-body { align-items: flex-start; }

      .msg-name {
        font-size: 11px;
        font-family: var(--mono);
        color: var(--muted);
        margin-bottom: 3px;
        padding: 0 4px;
      }

      .msg-bubble {
        border-radius: 18px;
        padding: 8px 14px;
        font-size: 13px;
        line-height: 1.5;
        word-break: break-word;
      }
      .bubble-local {
        background: var(--accent);
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .bubble-peer {
        background: var(--surface2);
        color: var(--text);
        border: 1px solid var(--border2);
        border-bottom-left-radius: 4px;
      }

      /* Markdown in bubbles */
      .msg-bubble p { margin: 0 0 6px; }
      .msg-bubble p:last-child { margin: 0; }
      .msg-bubble h1, .msg-bubble h2, .msg-bubble h3,
      .msg-bubble h4, .msg-bubble h5, .msg-bubble h6 { margin: 6px 0 4px; font-size: inherit; font-weight: 600; }
      .msg-bubble ul, .msg-bubble ol { margin: 4px 0; padding-left: 18px; }
      .msg-bubble li { margin: 2px 0; }
      .msg-bubble a { color: inherit; text-decoration: underline; opacity: .85; }
      .msg-bubble strong { font-weight: 600; }
      .msg-bubble table {
        border-collapse: collapse;
        width: 100%;
        margin: 6px 0;
        font-size: 12px;
        overflow: hidden;
        border-radius: 6px;
      }
      .msg-bubble th,
      .msg-bubble td {
        border: 1px solid rgba(127,127,127,.28);
        padding: 4px 6px;
        text-align: left;
        vertical-align: top;
      }
      .bubble-local th,
      .bubble-local td { border-color: rgba(255,255,255,.28); }
      .msg-bubble blockquote {
        margin: 6px 0;
        padding: 2px 0 2px 10px;
        border-left: 3px solid rgba(127,127,127,.42);
        opacity: .9;
      }
      .bubble-local blockquote { border-left-color: rgba(255,255,255,.55); }
      .msg-bubble hr {
        border: 0;
        border-top: 1px solid rgba(127,127,127,.28);
        margin: 8px 0;
      }
      .bubble-local hr { border-top-color: rgba(255,255,255,.28); }
      .bubble-local .md-code { background: rgba(0,0,0,.2); }
      .bubble-peer  .md-code { background: var(--surface3); }
      .md-code {
        display: block;
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        font-family: var(--mono);
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-all;
        margin: 6px 0;
        overflow-x: auto;
      }
      .md-inline-code {
        font-family: var(--mono);
        font-size: 11px;
        padding: 1px 5px;
        border-radius: 3px;
        background: rgba(0,0,0,.15);
      }

      .msg-metafiles {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 100%;
        max-width: 320px;
      }

      .msg-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        max-width: 100%;
        margin-top: 3px;
        padding: 0 4px;
      }
      .msg-meta-local { justify-content: flex-end; }
      .msg-meta-peer { justify-content: flex-start; }

      .msg-time {
        font-size: 10px;
        font-family: var(--mono);
        color: var(--dim);
        flex-shrink: 0;
      }

      .msg-txid {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        min-width: 0;
        color: var(--dim);
        opacity: .85;
      }
      .msg-txid-text {
        font-size: 10px;
        font-family: var(--mono);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .copy-action {
        width: 16px;
        height: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 0;
        cursor: pointer;
        border-radius: 3px;
        flex-shrink: 0;
        transition: color .1s, background .1s;
      }
      .copy-action:hover {
        color: var(--accent);
        background: var(--surface3);
      }
      .copy-icon {
        width: 13px;
        height: 13px;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .copy-toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 50;
        min-width: 96px;
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        background: rgba(16, 24, 40, .94);
        color: #fff;
        font-size: 12px;
        font-family: var(--mono);
        text-align: center;
        box-shadow: 0 8px 22px rgba(0,0,0,.22);
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
        transition: opacity .16s, transform .16s;
      }
      .copy-toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      /* Metafile previews */
      .metafile-preview {
        border: 1px solid var(--border2);
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--surface2);
      }
      .metafile-preview img,
      .metafile-preview video { width: 100%; max-height: 240px; object-fit: contain; display: block; }
      .metafile-preview audio { width: 100%; display: block; }
      .metafile-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 10px;
        border-top: 1px solid var(--border);
      }
      .metafile-pin {
        font-size: 10px;
        font-family: var(--mono);
        color: var(--dim);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .metafile-dl {
        font-size: 11px;
        font-family: var(--mono);
        color: var(--accent);
        text-decoration: none;
        flex-shrink: 0;
        margin-left: 8px;
      }
      .metafile-dl-card { padding: 10px; display: flex; justify-content: space-between; align-items: center; }

      /* Error text */
      .error-text { color: var(--red); }

      /* Status tones inside status pill for active sessions */
      .tone-active .status-dot { animation: pulse 2s infinite; }

      /* Mobile: stack panels */
      @media (max-width: 768px) {
        .trace-stats { padding: 12px 16px 0; }
        .trace-workspace { margin: 12px 16px 16px; flex-direction: column; }
        .session-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); max-height: 220px; }
        .detail-panel { min-height: 300px; }
        .msg-row { padding: 3px 12px; }
        .msg-bubble { max-width: 85%; }
        .copy-toast { right: 16px; bottom: 16px; }
      }
    </style>
  </head>
  <body>
    <div class="trace-shell">
      <header class="topbar">
        <a class="topbar-logo" href="/ui/hub">MetaBot</a>
        <div class="topbar-sep"></div>
        <span class="topbar-title">__PAGE_EYEBROW__</span>
        <div class="topbar-spacer"></div>
        <nav class="topbar-nav">__PAGE_NAV__</nav>
      </header>

      <!-- Summary stats row -->
      <div class="trace-stats">
        <div class="stat-card">
          <div class="stat-label">Total A2A Sessions</div>
          <div class="stat-value" data-trace-total>—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Services Used</div>
          <div class="stat-value accent" data-trace-caller>—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Services Provided</div>
          <div class="stat-value green" data-trace-provider>—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Last Activity</div>
          <div class="stat-value sm" data-trace-last>—</div>
        </div>
      </div>

      <!-- Two-panel workspace -->
      <div class="trace-workspace">
        <!-- Left: session list -->
        <aside class="session-panel" aria-label="A2A session list">
          <div class="session-panel-header">
            <span class="session-panel-title">Sessions</span>
          </div>
          <div class="session-list-scroll">
            <div data-session-list>
              <div class="session-empty"><p>Loading sessions…</p></div>
            </div>
          </div>
        </aside>

        <!-- Right: session detail -->
        <section class="detail-panel" aria-label="Session detail" data-session-detail>
          <div class="detail-empty">
            <span class="mono">Select a session to inspect it</span>
          </div>
        </section>
      </div>
    </div>
    <div class="copy-toast" data-copy-toast role="status" aria-live="polite"></div>
    <script>__PAGE_SCRIPT__</script>
  </body>
</html>
