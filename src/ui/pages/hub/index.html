<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__PAGE_TITLE__</title>
    <link rel="stylesheet" href="/ui/shared.css" />
    <style>
      /* Hub-specific: service table cell styles */
      .svc-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
      .svc-desc { font-size: 12px; color: var(--muted); max-width: 340px; line-height: 1.45; }
      .svc-provider-name { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
      .svc-provider-gmid { font-size: 11px; font-family: var(--mono); color: var(--dim); word-break: break-all; max-width: 180px; }
      .svc-price { font-family: var(--mono); font-size: 12px; color: var(--amber); white-space: nowrap; }
      .svc-skill {
        font-family: var(--mono); font-size: 11px; color: var(--muted);
        background: var(--surface2); border: 1px solid var(--border2);
        border-radius: 4px; padding: 2px 7px; display: inline-block; white-space: nowrap;
      }
      .last-seen { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
      .section-updated { margin-left: auto; font-size: 11px; font-family: var(--mono); color: var(--dim); }
      @media (max-width: 768px) {
        .data-table th:nth-child(4),
        .data-table td:nth-child(4),
        .data-table th:nth-child(5),
        .data-table td:nth-child(5) { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="topbar-logo" href="/ui/hub">MetaBot</a>
        <div class="topbar-sep"></div>
        <span class="topbar-title">Service Hub</span>
        <div class="topbar-spacer"></div>
        <nav class="topbar-nav">__PAGE_NAV__</nav>
      </header>

      <main class="content">
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">Online Services</div>
            <div class="stat-value green" data-online-count>—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Listed</div>
            <div class="stat-value" data-total-count>—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Top Service</div>
            <div class="stat-value sm" data-top-service>—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Directory Source</div>
            <div class="stat-value sm" data-directory-mode>—</div>
          </div>
        </div>

        <div class="section-header">
          <span class="section-title">LIVE SERVICES</span>
          <span class="section-badge" data-online-badge>0 online</span>
          <span class="section-updated" data-directory-updated></span>
          <button class="btn btn-sm" id="refresh-btn">↻ refresh</button>
        </div>

        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Service</th>
                <th>Provider</th>
                <th>Price</th>
                <th>Skill</th>
                <th>Status</th>
                <th>Last Seen</th>
              </tr>
            </thead>
            <tbody data-service-list>
              <tr><td colspan="6" class="table-empty"><strong>Loading…</strong>fetching online services</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Agent Hub — Yellow Pages Directory -->
        <div data-service-directory data-directory-empty hidden style="display:none"></div>
      </main>
    </div>
    <script>__PAGE_SCRIPT__</script>
  </body>
</html>
