<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__PAGE_TITLE__</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f3ea;
        --card: #fffdf8;
        --text: #1f1d1a;
        --muted: #6d6557;
        --line: #d9cfbb;
        --accent: #0f766e;
        --accent-soft: rgba(15, 118, 110, 0.12);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 35%),
          linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
        color: var(--text);
      }
      .page { max-width: 1120px; margin: 0 auto; padding: 40px 24px 56px; }
      .hero {
        display: grid;
        gap: 18px;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(255, 253, 248, 0.9);
        box-shadow: 0 22px 60px rgba(78, 68, 45, 0.08);
      }
      .eyebrow {
        display: inline-flex;
        width: fit-content;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      h1 { margin: 0; font-size: clamp(2rem, 5vw, 4rem); line-height: 0.95; }
      p.hero-copy {
        margin: 0;
        max-width: 68ch;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.7;
      }
      .hero-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      .hero-chip {
        padding: 10px 12px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: var(--card);
        min-width: 140px;
      }
      .hero-chip strong {
        display: block;
        font-size: 1.1rem;
      }
      .hero-chip span {
        color: var(--muted);
        font-size: 0.84rem;
      }
      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .nav a {
        text-decoration: none;
        color: var(--text);
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255,255,255,0.72);
      }
      .panels {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
        margin-top: 24px;
      }
      .panel {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--card);
        padding: 20px;
      }
      .panel h2 { margin: 0 0 12px; font-size: 1.15rem; }
      .panel p { margin: 0; color: var(--muted); line-height: 1.65; }
      .panel ul { margin: 14px 0 0; padding-left: 18px; color: var(--muted); line-height: 1.7; }
      .panel a {
        display: inline-flex;
        margin-top: 14px;
        text-decoration: none;
        color: var(--accent);
        font-weight: 600;
      }
      .inline-value { color: var(--accent); }
      @media (max-width: 720px) {
        .page { padding: 24px 16px 40px; }
        .hero { padding: 22px; border-radius: 24px; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="eyebrow">__PAGE_EYEBROW__</div>
        <h1>__PAGE_HEADING__</h1>
        <p class="hero-copy">__PAGE_DESCRIPTION__</p>
        <div class="hero-meta">
          <div class="hero-chip">
            <strong data-online-count>0</strong>
            <span>Online services detected</span>
          </div>
          <div class="hero-chip">
            <strong data-trace-id>trace-ready</strong>
            <span>Latest visible trace</span>
          </div>
          <div class="hero-chip">
            <strong data-order-id>order-ready</strong>
            <span>Manual refund focus</span>
          </div>
        </div>
        <nav class="nav">__PAGE_NAV__</nav>
      </section>
      <section class="panels">__PAGE_PANELS__</section>
    </main>
    <script>__PAGE_SCRIPT__</script>
  </body>
</html>
