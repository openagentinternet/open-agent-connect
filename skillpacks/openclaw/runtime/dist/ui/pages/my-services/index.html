<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__PAGE_TITLE__</title>
    <link rel="stylesheet" href="/ui/shared.css" />
    <style>
      .provider-console { display: grid; gap: 18px; }
      .console-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
      }
      .console-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 18px;
      }
      .presence-toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }
      .presence-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 12px;
        margin-bottom: 16px;
      }
      .presence-eyebrow {
        font-size: 11px;
        font-family: var(--mono);
        text-transform: uppercase;
        letter-spacing: .06em;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .presence-toggle {
        font-size: 12px;
        font-family: var(--mono);
        padding: 6px 14px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        transition: background .15s;
        white-space: nowrap;
      }
      .presence-toggle:hover { background: #5254cc; }
      .presence-rows { display: grid; gap: 0; }
      .presence-row {
        display: grid;
        grid-template-columns: 140px minmax(0, 1fr);
        gap: 12px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }
      .presence-row dt { font-size: 11px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
      .presence-row dd { margin: 0; font-size: 12px; overflow-wrap: anywhere; }
      .section-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }
      .section-header h2 { font-size: 13px; font-family: var(--mono); font-weight: 500; flex: 1; }
      .section-count {
        font-size: 11px;
        font-family: var(--mono);
        padding: 2px 8px;
        border-radius: 4px;
        background: var(--accent-dim);
        color: var(--accent);
      }
      .console-table { width: 100%; border-collapse: collapse; }
      .table-wrap { overflow-x: auto; }
      .console-table th {
        font-size: 11px;
        font-family: var(--mono);
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: .06em;
        padding: 8px 12px;
        text-align: left;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
      }
      .console-table td {
        padding: 11px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        vertical-align: top;
      }
      .console-table tbody tr:last-child td { border-bottom: none; }
      .console-table tbody tr:hover { background: var(--surface2); }
      .mono-cell, .mono-text { font-family: var(--mono); font-size: 11px; color: var(--dim); overflow-wrap: anywhere; }
      .refund-cell { min-width: 180px; color: var(--dim); font-size: 11px; }
      .refund-cell span {
        display: block;
        margin-bottom: 2px;
        color: var(--muted);
        font-family: var(--mono);
        text-transform: uppercase;
        letter-spacing: .06em;
      }
      .refund-cell p { margin: 0 0 6px; }
      .flag-text { margin-top: 4px; color: var(--amber); font-size: 11px; font-family: var(--mono); }
      .console-empty { color: var(--muted); font-size: 12px; font-family: var(--mono); }
      .console-empty-cell { text-align: center; color: var(--muted); font-size: 12px; font-family: var(--mono); padding: 24px !important; }
      .manual-actions { display: grid; gap: 12px; }
      .manual-action-item {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 0 0;
        border-top: 1px solid var(--border);
      }
      .manual-action-item p { margin: 6px 0 0; color: var(--muted); font-size: 12px; }
      .manual-action-links { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; flex-shrink: 0; }
      .manual-action-links a { color: var(--accent); text-decoration: none; font-size: 12px; font-family: var(--mono); }
      .manual-action-links a:hover { text-decoration: underline; }
      @media (max-width: 980px) {
        .manual-action-item { flex-direction: column; }
        .manual-action-links { align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="topbar-logo" href="/ui/hub">MetaBot</a>
        <div class="topbar-sep"></div>
        <span class="topbar-title">__PAGE_EYEBROW__</span>
        <div class="topbar-spacer"></div>
        <nav class="topbar-nav">__PAGE_NAV__</nav>
      </header>
      <main class="content">
        __PAGE_CONTENT__
      </main>
    </div>
    <script>__PAGE_SCRIPT__</script>
  </body>
</html>
