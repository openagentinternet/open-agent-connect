<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__PAGE_TITLE__</title>
    <link rel="stylesheet" href="/ui/shared.css" />
    <style>
      .refund-shell { display: grid; gap: 18px; }
      .refund-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
      }
      .refund-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 12px;
        margin-bottom: 18px;
      }
      .refund-eyebrow {
        font-size: 11px;
        font-family: var(--mono);
        text-transform: uppercase;
        letter-spacing: .06em;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .refund-status { font-size: 12px; font-family: var(--mono); color: var(--muted); font-weight: 500; }
      .refund-status[data-tone="success"] { color: var(--green); }
      .refund-status[data-tone="busy"]    { color: var(--amber); }
      .refund-status[data-tone="error"]   { color: var(--red); }
      .refund-rows { display: grid; gap: 0; }
      .refund-row {
        display: grid;
        grid-template-columns: 160px minmax(0, 1fr);
        gap: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }
      .refund-row dt { font-size: 11px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
      .refund-row dd { margin: 0; font-size: 12px; overflow-wrap: anywhere; }
      .refund-actions { margin-top: 20px; }
      .mono-text { font-family: var(--mono); font-size: 11px; color: var(--dim); overflow-wrap: anywhere; }
      @media (max-width: 600px) {
        .refund-row { grid-template-columns: 1fr; gap: 4px; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="topbar-logo" href="/ui/hub">MetaBot</a>
        <div class="topbar-sep"></div>
        <span class="topbar-title">__PAGE_EYEBROW__</span>
        <div class="topbar-spacer"></div>
        <nav class="topbar-nav">__PAGE_NAV__</nav>
      </header>
      <main class="content-narrow">
        __PAGE_CONTENT__
      </main>
    </div>
    <script>__PAGE_SCRIPT__</script>
  </body>
</html>
