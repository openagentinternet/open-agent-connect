<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__PAGE_TITLE__</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --surface: #ffffff;
        --surface-soft: #eef4f7;
        --text: #16202a;
        --muted: #657282;
        --line: #d6dee7;
        --accent: #0f766e;
        --accent-strong: #0b5e59;
        --danger: #b42318;
        --danger-hover: #a01c15;
        --warning: #b45309;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(15, 118, 110, 0.08), transparent 280px),
          var(--bg);
      }

      .viewer-shell {
        min-height: 100svh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .viewer-header {
        padding: 22px clamp(16px, 4vw, 42px);
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(18px);
      }

      .viewer-header-inner {
        max-width: 1180px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        align-items: end;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--accent-strong);
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.7rem, 4vw, 2.8rem);
        line-height: 1.04;
        letter-spacing: 0;
      }

      .viewer-subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.5;
        max-width: 720px;
      }

      .viewer-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      .peer-control {
        display: grid;
        gap: 6px;
        min-width: min(360px, calc(100vw - 32px));
      }

      .peer-control > span:first-child {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .peer-row {
        display: flex;
        gap: 8px;
      }

      input {
        width: 100%;
        min-width: 0;
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        color: var(--text);
        background: var(--surface);
        font: inherit;
      }

      button {
        height: 40px;
        border: 0;
        border-radius: 8px;
        padding: 0 14px;
        color: #ffffff;
        background: var(--accent);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button[data-chat-stop] {
        background: var(--danger);
      }

      button[data-chat-stop]:hover {
        background: var(--danger-hover);
      }

      button[data-chat-stop]:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .viewer-main {
        max-width: 1180px;
        width: 100%;
        margin: 0 auto;
        padding: 18px clamp(16px, 4vw, 42px) 28px;
        display: grid;
        grid-template-rows: auto auto minmax(360px, 1fr);
        gap: 14px;
        min-height: 0;
      }

      .meta-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        border: 0;
        background: none;
        color: var(--muted);
        font: inherit;
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        cursor: pointer;
        padding: 0 0 6px;
        height: auto;
        width: auto;
      }

      .meta-toggle:hover {
        color: var(--text);
        background: none;
      }

      .meta-toggle-arrow {
        display: inline-block;
        transition: transform 200ms ease;
        font-size: 0.7rem;
      }

      .meta-toggle-arrow.collapsed {
        transform: rotate(-90deg);
      }

      .conversation-meta {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        overflow: hidden;
        transition: grid-template-rows 200ms ease, opacity 200ms ease;
      }

      .conversation-meta.collapsed {
        display: none;
      }

      .meta-item {
        min-width: 0;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
      }

      .meta-item span {
        display: block;
        color: var(--muted);
        font-size: 0.74rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .meta-item strong {
        display: block;
        margin-top: 5px;
        overflow-wrap: anywhere;
        font-size: 0.92rem;
      }

      .peer-info {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 5px;
      }

      .peer-avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
        background: var(--surface-soft);
      }

      .peer-name {
        font-weight: 700;
        font-size: 0.92rem;
        overflow-wrap: anywhere;
      }

      [data-chat-status][data-tone="ready"] {
        color: var(--accent-strong);
      }

      [data-chat-status][data-tone="error"] {
        color: var(--danger);
      }

      [data-chat-status][data-tone="warning"] {
        color: var(--warning);
      }

      .message-surface {
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: var(--surface);
        margin-bottom: 24px;
      }

      id-chat-msg-list {
        display: block;
        width: 100%;
        height: min(680px, calc(100svh - 250px));
        min-height: 360px;
        --id-bg-body: var(--surface-soft);
        --id-text-secondary: var(--muted);
        --id-color-primary: var(--accent);
      }

      @media (max-width: 860px) {
        .viewer-header-inner {
          grid-template-columns: 1fr;
          align-items: start;
        }

        .viewer-actions {
          justify-content: stretch;
        }

        .peer-control {
          width: 100%;
          min-width: 0;
        }

        .conversation-meta {
          grid-template-columns: 1fr 1fr;
        }

        id-chat-msg-list {
          height: calc(100svh - 360px);
        }
      }

      @media (max-width: 560px) {
        .peer-row {
          flex-direction: column;
        }

        button {
          width: 100%;
        }

        .conversation-meta {
          grid-template-columns: 1fr;
        }

        .viewer-main {
          grid-template-rows: auto minmax(320px, 1fr);
        }

        id-chat-msg-list {
          min-height: 320px;
          height: calc(100svh - 520px);
        }
      }
    </style>
  </head>
  <body>
    <div class="viewer-shell">
      <header class="viewer-header">
        <div class="viewer-header-inner">
          <div>
            <p class="eyebrow">__PAGE_EYEBROW__</p>
            <h1>__PAGE_HEADING__</h1>
            <p class="viewer-subtitle">__PAGE_DESCRIPTION__</p>
          </div>
          <div class="viewer-actions">
            <label class="peer-control">
              <span>Peer globalMetaId</span>
              <span class="peer-row">
                <input data-chat-peer-input type="text" autocomplete="off" spellcheck="false" placeholder="gm-target" />
                <button data-chat-refresh type="button">Refresh</button>
                <button data-chat-stop type="button">End Chat</button>
              </span>
            </label>
          </div>
        </div>
      </header>

      <main class="viewer-main">
        <div>
          <button class="meta-toggle" data-meta-toggle type="button">
            <span class="meta-toggle-arrow" data-meta-arrow>&#9660;</span> Info
          </button>
        </div>
        <section class="conversation-meta" data-meta-section aria-label="Conversation status">
          <div class="meta-item">
            <span>Local MetaBot</span>
            <strong data-chat-self>Waiting for local identity</strong>
          </div>
          <div class="meta-item">
            <span>Peer MetaBot</span>
            <div data-chat-peer-container>
              <strong data-chat-peer>No peer selected</strong>
            </div>
          </div>
          <div class="meta-item">
            <span>Messages</span>
            <strong data-chat-count>0 messages</strong>
          </div>
          <div class="meta-item">
            <span>Status</span>
            <strong data-chat-status data-tone="neutral">Ready</strong>
          </div>
        </section>

        <section class="message-surface" aria-label="Private chat messages">
          <id-chat-msg-list
            data-chat-message-list
            viewer-mode="standalone"
            mode="private"
            disable-mention-navigation="true"
          ></id-chat-msg-list>
        </section>
      </main>
    </div>
    <script>__PAGE_SCRIPT__</script>
  </body>
</html>
