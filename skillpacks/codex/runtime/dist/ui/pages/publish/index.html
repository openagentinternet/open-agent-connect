<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__PAGE_TITLE__</title>
    <link rel="stylesheet" href="/ui/shared.css" />
    <style>
      .publish-shell {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(300px, 1fr);
        gap: 20px;
        align-items: start;
      }
      .publish-form {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 22px;
      }
      .publish-form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
      .publish-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .publish-field-wide { grid-column: span 2; }
      .publish-field span {
        font-size: 11px;
        font-family: var(--mono);
        text-transform: uppercase;
        letter-spacing: .06em;
        color: var(--muted);
      }
      .publish-field input,
      .publish-field textarea {
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: var(--radius-sm);
        padding: 9px 12px;
        color: var(--text);
        font-family: var(--sans);
        font-size: 13px;
        transition: border-color .15s;
        width: 100%;
      }
      .publish-field input:focus,
      .publish-field textarea:focus { outline: none; border-color: var(--accent); }
      .publish-actions {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .publish-status {
        font-size: 12px;
        font-family: var(--mono);
        color: var(--muted);
      }
      .publish-status[data-tone="success"] { color: var(--green); }
      .publish-status[data-tone="error"]   { color: var(--red); }
      .publish-status[data-tone="busy"]    { color: var(--amber); }
      .publish-cards { display: grid; gap: 14px; }
      .publish-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
      }
      .publish-card h2 { font-size: 13px; font-family: var(--mono); font-weight: 500; margin-bottom: 8px; }
      .publish-card-summary,
      .publish-card-empty { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
      .publish-card-rows { display: grid; gap: 0; }
      .publish-card-row {
        display: grid;
        grid-template-columns: 132px minmax(0, 1fr);
        gap: 12px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }
      .publish-card-row dt { font-size: 11px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
      .publish-card-row dd { margin: 0; font-size: 12px; overflow-wrap: anywhere; font-family: var(--mono); color: var(--dim); }
      @media (max-width: 900px) {
        .publish-shell { grid-template-columns: 1fr; }
        .publish-form-grid { grid-template-columns: 1fr; }
        .publish-field-wide { grid-column: span 1; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="topbar-logo" href="/ui/hub">MetaBot</a>
        <div class="topbar-sep"></div>
        <span class="topbar-title">__PAGE_EYEBROW__</span>
        <div class="topbar-spacer"></div>
        <nav class="topbar-nav">__PAGE_NAV__</nav>
      </header>
      <main class="content">
        __PAGE_CONTENT__
      </main>
    </div>
    <script>__PAGE_SCRIPT__</script>
  </body>
</html>
