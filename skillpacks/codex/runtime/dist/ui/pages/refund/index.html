<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__PAGE_TITLE__</title>
    <link rel="stylesheet" href="/ui/shared.css" />
    <style>
      .refund-shell { display: grid; gap: 18px; }
      .refund-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
      }
      .refund-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 12px;
        margin-bottom: 18px;
      }
      .refund-eyebrow {
        font-size: 11px;
        font-family: var(--mono);
        text-transform: uppercase;
        letter-spacing: .06em;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .refund-status { font-size: 12px; font-family: var(--mono); color: var(--muted); font-weight: 500; }
      .refund-status[data-tone="success"] { color: var(--green); }
      .refund-status[data-tone="busy"]    { color: var(--amber); }
      .refund-status[data-tone="error"]   { color: var(--red); }
      .refund-status[data-tone="ready"]   { color: var(--green); }
      .refund-section-header {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }
      .refund-section-count {
        font-size: 11px;
        font-family: var(--mono);
        padding: 2px 8px;
        border-radius: 4px;
        background: var(--accent-dim);
        color: var(--accent);
      }
      .refund-summary-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-top: 12px; }
      .refund-summary-item { border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; background: var(--panel); }
      .refund-summary-label { font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
      .refund-summary-value { margin-top: 4px; font-size: 18px; font-weight: 600; }
      .refund-list { display: grid; gap: 10px; }
      .refund-item { border: 1px solid var(--border); border-radius: 12px; padding: 12px; background: var(--panel); }
      .refund-item-top { display: flex; justify-content: space-between; align-items: start; gap: 10px; margin-bottom: 10px; }
      .refund-counterparty { display: flex; align-items: center; gap: 10px; min-width: 0; }
      .refund-avatar { width: 36px; height: 36px; border-radius: 999px; border: 1px solid var(--border); object-fit: cover; background: var(--surface); }
      .refund-counterparty-meta { min-width: 0; }
      .refund-counterparty-name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .refund-badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 9px; font-size: 10px; font-weight: 600; font-family: var(--mono); text-transform: uppercase; letter-spacing: .05em; }
      .refund-badge[data-tone="pending"] { background: color-mix(in srgb, var(--amber) 20%, transparent); color: var(--amber); }
      .refund-badge[data-tone="refunded"] { background: color-mix(in srgb, var(--green) 20%, transparent); color: var(--green); }
      .refund-badge[data-tone="failed"] { background: color-mix(in srgb, var(--red) 18%, transparent); color: var(--red); }
      .refund-grid { display: grid; gap: 8px; grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .refund-field { border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; }
      .refund-field-wide { grid-column: 1 / -1; }
      .refund-label { font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 4px; }
      .refund-value { font-size: 12px; overflow-wrap: anywhere; }
      .refund-note { margin-top: 8px; font-size: 11px; color: var(--muted); }
      .refund-actions { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
      .refund-actions a {
        color: var(--accent);
        text-decoration: none;
        font-size: 12px;
        font-family: var(--mono);
      }
      .refund-actions a:hover { text-decoration: underline; }
      .refund-action {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: var(--radius-sm);
        padding: 7px 12px;
        font-family: var(--mono);
        font-size: 12px;
        cursor: pointer;
      }
      .refund-action:disabled { opacity: .7; cursor: wait; }
      .refund-empty { margin: 0; padding: 16px; text-align: center; border: 1px dashed var(--border); border-radius: 10px; color: var(--muted); }
      .mono-text { font-family: var(--mono); font-size: 11px; color: var(--dim); overflow-wrap: anywhere; }
      @media (max-width: 600px) {
        .refund-summary-grid { grid-template-columns: 1fr; }
        .refund-grid { grid-template-columns: 1fr; }
        .refund-actions { align-items: flex-start; flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="topbar-logo" href="/ui/hub">MetaBot</a>
        <div class="topbar-sep"></div>
        <span class="topbar-title">__PAGE_EYEBROW__</span>
        <div class="topbar-spacer"></div>
        <nav class="topbar-nav">__PAGE_NAV__</nav>
      </header>
      <main class="content-narrow">
        __PAGE_CONTENT__
      </main>
    </div>
    <script>__PAGE_SCRIPT__</script>
  </body>
</html>
